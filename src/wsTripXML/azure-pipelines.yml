# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool: default

steps:
- task: AssembyInfoReader@3
  inputs:
    searchPattern: '.\My Project\AssemblyInfo.vb'

- task: OctopusPack@4
  inputs:
    PackageId: 'wsTripXML'
    PackageFormat: 'NuPkg'
    PackageVersion: '$(AssemblyInfo.AssemblyFileVersion)'    
    AdditionalArguments: '/p:OctoPackEnforceAddingFiles=true'
    Overwrite: true