# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool: default

steps:
- checkout: git://TripXML/XSLs

- task: BatchScript@1
  inputs:
    filename: './Build.bat'

- task: NuGetToolInstaller@1
  inputs:
    versionSpec: '6.6.1'

- task: NuGetCommand@2
  inputs:
    command: 'pack'
    packagesToPack: './XSLs.nuspec'
    versioningScheme: 'byPrereleaseNumber'
    majorVersion: '1'
    minorVersion: '0'
    patchVersion: '0'
    packTimezone: 'local'

- task: NuGetCommand@2
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg;!$(Build.ArtifactStagingDirectory)/**/*.symbols.nupkg'
    nuGetFeedType: 'internal'
    publishVstsFeed: 'deaaff32-b3aa-4f28-a563-1820fea6f8ba'
