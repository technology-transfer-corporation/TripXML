# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool: default

steps:
- checkout: git://TripXML/XSLs

- task: BatchScript@1
  inputs:
    filename: './XSLs/Build.bat'

- task: NuGetCommand@2
  inputs:
    command: 'pack'
    packagesToPack: './XSLs/XSLs.nuspec'
    versioningScheme: 'byPrereleaseNumber'
    majorVersion: '1'
    minorVersion: '0'
    patchVersion: '0'
    packTimezone: 'local'


